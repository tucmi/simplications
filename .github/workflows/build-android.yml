name: Build Android APK

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Prepare versioned APK filename
        id: apk
        shell: bash
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          APK_SRC="build/app/outputs/flutter-apk/app-release.apk"
          APK_NAME="simplications-${VERSION}-android-release.apk"
          APK_TARGET="build/app/outputs/flutter-apk/${APK_NAME}"
          cp "${APK_SRC}" "${APK_TARGET}"
          echo "apk_path=${APK_TARGET}" >> "${GITHUB_OUTPUT}"

      - name: Attach APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.apk_path }}